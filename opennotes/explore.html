<!DOCTYPE html>
<html>
<head>
<title>OpenNotes Social Post</title>

<style>
    

body{
font-family: serif;
background:#f4f4f4;
}

/* main creator box */

.post-box{
width:600px;
border:3px solid orange;
margin:40px auto;
padding:15px;
background:white;
position:relative;
}

/* username + title inputs */

.username,
.title{
width:60%;
padding:6px;
margin-bottom:10px;
}

/* image upload box */

.image-box{
width:200px;
height:150px;
border:2px solid orange;
position:absolute;
right:15px;
top:40px;
padding:10px;
font-size:14px;
}

/* textarea */

.text-area{
width:95%;
height:150px;
overflow-y:scroll;
margin-top:120px;
padding:10px;

resize:none;
word-wrap:break-word;
overflow-wrap:break-word;
}

/* post button */

.post-btn{
width:120px;
height:40px;
background:orange;
border:none;
color:rgb(181, 51, 51);
font-size:16px;
cursor:pointer;
display:block;
margin:20px auto;
}

/* feed container */

.feed{
width:600px;
margin:auto;
}

/* each post */

.post{
border:2px solid rgb(255, 42, 0);
padding:15px;
margin-top:20px;
background:white;

/* TEXT OVERFLOW FIX */
word-wrap:break-word;
overflow-wrap:break-word;
white-space:pre-wrap;
}

/* images inside post */

.post img{
width:120px;
margin:5px;
border-radius:5px;
}

/* username style */

.post h4{
margin:0;
color:#c0392b;
}

/* title style */

.post h5{
margin:5px 0;
color:#e67e22;
}
footer{

background:#080808;
color:white;
text-align:center;
padding:18px;

}

</style>
</head>


<body>
<header>

<h2>📊 OpenNotes Social</h2>

<a href="index.html">⬅ Go back to Home page</a>

</header>

<!-- POST CREATOR -->

<div class="post-box">

<input
class="username"
id="username"
placeholder="@username">

<br>

<input
class="title"
id="title"
placeholder="Add title upto 15 words">


<div class="image-box">

Upload max 2 images

<br><br>

<input
type="file"
id="images"
accept="image/*"
multiple>

</div>


<textarea
class="text-area"
id="content"
placeholder="Write post (max 250 words)"></textarea>


<button
class="post-btn"
onclick="createPost()">POST</button>

</div>


<!-- TIMELINE FEED -->

<div
class="feed"
id="feed"></div>



<script>

function createPost(){

let username =
document.getElementById("username").value;

let title =
document.getElementById("title").value;

let content =
document.getElementById("content").value;

let imageInput =
document.getElementById("images");

let files =
imageInput.files;


/* required fields check */

if(username=="" || content==""){
alert("Username and post required!");
return;
}


/* image limit check */

if(files.length > 2){
alert("Only 2 images allowed!");
return;
}


/* create post box */

let postBox =
document.createElement("div");

postBox.className="post";


let imagesHTML="";


for(let i=0;i<files.length;i++){

let imageURL =
URL.createObjectURL(files[i]);

imagesHTML +=
"<img src='"+imageURL+"'>";

}


/* insert post content */

postBox.innerHTML=

"<h4>"+username+"</h4>" +

"<h5>"+title+"</h5>" +

"<p>"+content+"</p>" +

imagesHTML;


/* add post to top */

document
.getElementById("feed")
.prepend(postBox);


/* clear fields after posting */

document
.getElementById("title").value="";

document
.getElementById("content").value="";

document
.getElementById("images").value="";

}

</script>
<footer>
    <div class="footer-links">
        <h3><u>ABOUT</u></h3>
        <div class="link-grid">
            <a href="info.html" target="_blank">ABOUT OpenNotes SOCIAL</a>

        </div>
    </div>
<footer>

© 2026 OpenNotes. All rights are reserved.<br>
Website Developed by Mohammad Sahil.

</footer>
</body>
</html>
